# Optix Configuration
# Interactive Brokers connection (default: IB Gateway live)
ibkr:
  host: "127.0.0.1"
  port: 4001          # 4001 Gateway live (default), 4002 Gateway paper, 7496 TWS live, 7497 TWS paper
  client_id: 1

# gRPC server settings
grpc:
  go_server_addr: "localhost:50051"
  python_server_addr: "localhost:50052"

# SQLite database
database:
  path: "./data/optix.db"

# Analysis defaults
analysis:
  forecast_days: 14
  risk_tolerance: "moderate"  # conservative / moderate / aggressive
  position_size_limit: 0.20   # max 20% of capital per trade

# Alert notification
notifications:
  terminal: true
  webhook_url: ""
  email:
    enabled: false
    smtp_host: ""
    smtp_port: 587
    from: ""
    to: ""
