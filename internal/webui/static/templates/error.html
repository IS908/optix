{{template "base" .}}

{{define "title"}}Error{{end}}

{{define "content"}}
<div class="min-h-[50vh] flex flex-col items-center justify-center text-center">
  <div class="text-6xl font-bold text-gray-700 mb-4">{{.Code}}</div>
  <h1 class="text-xl font-semibold text-gray-300 mb-3">Something went wrong</h1>
  <p class="text-gray-500 max-w-lg mb-6">{{.Error}}</p>
  <div class="flex gap-3">
    <a href="/dashboard" class="bg-emerald-600 hover:bg-emerald-500 text-white text-sm px-4 py-2 rounded-lg transition-colors">
      ← Dashboard
    </a>
    <a href="?refresh=true" class="bg-gray-700 hover:bg-gray-600 text-white text-sm px-4 py-2 rounded-lg transition-colors">
      Try Refresh Live
    </a>
  </div>
</div>
{{end}}
